<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="-1">
  <meta http-equiv="refresh" content="60">
  <title>Paralegal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #0f0f0f; }
    iframe { width: 100%; height: 100vh; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="painel" src="about:blank"></iframe>
  <script>
    function loadPanel() {
      const ts = Math.floor(Date.now() / 60000);
      document.getElementById('painel').src = 'paralegal_final_2.html?v=' + ts;
    }
    loadPanel();
    setInterval(loadPanel, 60000);
  </script>
</body>
</html>
